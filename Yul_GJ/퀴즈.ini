#.추가해야 할 문화재
1. 관꾸미개 
[관꾸미개는 일반적으로 ‘고깔형태의 관[帽冠]’ 정면에 있는 포켓에 끼워 쓴다. 이 관꾸미개는 힘찬 새의 날개를 연상시키며, 앞판과 양쪽 날개 세 개를 조합하여 만들었다. 앞판의 윗부분을 비롯하여 양쪽 날개에는 용무늬를 새겼는데, 너무 추상화되어 흡사 덩굴무늬처럼 보인다. 앞면에는 고깔에 끼우는 부위를 제외하고 빼곡하게 달개를 달았으나, 뒷면에는 고깔과 맞닿지 않는 날개의 윗부분에만 달개를 달았다.]
{관꾸미개 }

2. 미륵삼존불
[1925년 경주 남산 장창골의 한 석실에서 옮겨왔다. 가운데 본존의 자세가 특이한데, 이처럼 의자에 앉아 있는 자세[倚子座]는 삼국시대 불상 가운데 유일하다. 중국의 6～7세기 불상 중에도 이런 자세를 하고 있는 불상이 있는데 대부분 미륵불이어서,『삼국유사』의 기록과 중국의 예로 미루어 본존불 또한 미륵불로 추정한다. 좌우의 보살은 4등신의 자그마한 체구에 연꽃을 손에 쥐고 서 있다. 머리에는 세 개의 꽃장식이 있는 보관을 썼으며, 신체에 비해서 큰 얼굴에는 천진난만한 미소가 보인다. 단단한 재질인 화강암을 이용하여 조각했음에도 불구하고 마치 살아 숨쉬는 듯한 온기가 느껴지는 신라의 대표적인 석불이다. ]
{미륵삼존불}

3. 얼굴무늬 수막새 
[얼굴무늬 수막새는 도톰한 입술과 위로 들린 입꼬리, 얕은 볼, 살짝 내민 눈동자가 서로 어우러져 천진스러운 미소를 머금고 있다. 막새에 얼굴형상을 하여 지붕 위에 올렸던 이유는 사악한 기운을 물리치려는 의도로 제작한 것으로 보인다.
이 기와는 일제강점기에 영묘사터에서 출토되었다고 전하며, 당시 일본인 다나카 토시노부가 구하여 보관하다 1972년 10월에 국립경주박물관에 기증한 문화재이다. 기와의 제작연대는 외측에 넓은 테두리를 마련하고 높은 온도에서 구운 점, 얼굴 양감이 그대로 살아있는 점으로 미루어 삼국시대로 추정된다.]
{얼굴무늬 수막새}


